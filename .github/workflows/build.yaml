name: Deploy to Server

on:
    pull_request:

jobs:
    build:
        runs-on:
            ubuntu-latest

        steps:
            - name: Clone the repository
              uses: actions/checkout@v6

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                node-version: '25'
                cache: 'npm'

            - name: Install and build
              run: |
                  npm install
                  npm run build
